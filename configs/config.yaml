server:
  host: "0.0.0.0"
  port: 8090
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "60s"

cache:
  default_mode: "cache-aside"
  default_ttl: "5m"
  max_value_size: 1048576
  enable_versioning: true

metrics:
  enabled: true
  path: "/metrics"

log_level: "info"
log_format: "json"

backends:
  - id: "local"
    type: "memory"
    name: "Local In-Memory Cache"
    weight: 10
    memory:
      max_cost: 1073741824
      num_counters: 10000000
      buffer_items: 64
      default_ttl: "5m"

  - id: "redis-master"
    type: "redis"
    name: "Redis Master"
    weight: 5
    group: "redis"
    redis:
      addr: "localhost:6379"
      password: ""
      db: 0
      pool_size: 20
      min_idle_conns: 5
      dial_timeout: "5s"
      read_timeout: "3s"
      write_timeout: "3s"
    health_check:
      enabled: true
      type: "ping"
      interval: "10s"
      timeout: "3s"
      failure_threshold: 3
      success_threshold: 2
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      success_threshold: 3
      timeout: "30s"
      half_open_max_calls: 10

  - id: "redis-slave"
    type: "redis"
    name: "Redis Slave"
    weight: 3
    group: "redis"
    redis:
      addr: "localhost:6380"
      password: ""
      db: 0
      pool_size: 20
      min_idle_conns: 5
      dial_timeout: "5s"
      read_timeout: "3s"
      write_timeout: "3s"
    health_check:
      enabled: true
      type: "ping"
      interval: "10s"
      timeout: "3s"
      failure_threshold: 3
      success_threshold: 2
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      success_threshold: 3
      timeout: "30s"
      half_open_max_calls: 10

  - id: "http-service"
    type: "http"
    name: "REST KV Service"
    weight: 2
    http:
      base_url: "http://localhost:8080/kv/"
      headers:
        Authorization: "Bearer token123"
        X-Client: "cache-proxy"
      timeout: "10s"
      max_conns: 100
      key_param: "key"
      value_param: "value"
      ttl_param: "ttl"
    health_check:
      enabled: true
      type: "tcp"
      interval: "15s"
      timeout: "5s"
      failure_threshold: 3
      success_threshold: 2
    circuit_breaker:
      enabled: true
      failure_threshold: 10
      success_threshold: 5
      timeout: "1m"
      half_open_max_calls: 5

  - id: "grpc-service"
    type: "grpc"
    name: "gRPC KV Service"
    weight: 4
    grpc:
      addr: "localhost:50051"
      timeout: "10s"
      max_msg_size: 4194304
      use_tls: false
      cert_file: ""
    health_check:
      enabled: true
      type: "ping"
      interval: "10s"
      timeout: "3s"
      failure_threshold: 3
      success_threshold: 2
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      success_threshold: 3
      timeout: "30s"
      half_open_max_calls: 10

routing:
  - strategy: "exact"
    pattern: "user:profile:*"
    backend_id: "redis-master"
    priority: 100

  - strategy: "exact"
    pattern: "user:session:*"
    backend_id: "redis-slave"
    priority: 90

  - strategy: "wildcard"
    pattern: "cache:*"
    backend_id: "local"
    priority: 80

  - strategy: "hash"
    pattern: "*"
    backend_id: "redis-master"
    priority: 10
    hash_mod: 2
    hash_remainder: 0

  - strategy: "hash"
    pattern: "*"
    backend_id: "redis-slave"
    priority: 10
    hash_mod: 2
    hash_remainder: 1

  - strategy: "blacklist"
    pattern: "temp:*"
    backend_id: "http-service"
    priority: 200

  - strategy: "whitelist"
    pattern: "secure:*"
    backend_id: "grpc-service"
    priority: 150

pubsub:
  enabled: false
  type: "redis"
  redis_url: "redis://localhost:6379/0"
  nats_url: ""
  channel: "cache-invalidation"

gossip:
  enabled: false
  bind_addr: "0.0.0.0"
  bind_port: 7946
  seed_nodes:
    - "127.0.0.1:7946"
  probe_interval: "1s"
  probe_timeout: "500ms"
